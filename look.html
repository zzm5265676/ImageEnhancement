<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>RGB → HSV → HVI 可视化（圆盘+一维H断裂）</title>
<style>
* {
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}
body {
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
    background: #f5f7fa;
}
.card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.color-preview {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    margin: 16px 0;
    border: 1px solid #eee;
}
.row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}
.col {
    flex: 1; min-width: 120px;
}
input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}
input[type="color"] {
    height: 44px;
    padding: 2px;
}
.value {
    font-size: 18px;
    font-weight: 600;
    color: #2563eb;
}
.label {
    font-size: 14px;
    color: #666;
    margin-bottom: 4px;
}
h2 {
    margin-top: 0;
    color: #333;
}
.title {
    text-align: center;
    margin-bottom: 24px;
}
canvas {
    border-radius: 12px;
    background: #f9f9f9;
    touch-action: none;
}
.canvas-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="title">
    <h1>RGB → HSV → HVI 可视化工具</h1>
    <p>支持：HV极坐标圆盘 | 一维H色调断裂 | 论文公式实时计算</p>
</div>

<!-- 颜色输入 -->
<div class="card">
    <h2>1. 选择 RGB 颜色</h2>
    <div class="row">
        <input type="color" id="colorPicker" value="#ff0000">
    </div>
    <div class="row">
        <div class="col">
            <div class="label">R (0-255)</div>
            <input type="number" id="r" min="0" max="255" value="255">
        </div>
        <div class="col">
            <div class="label">G (0-255)</div>
            <input type="number" id="g" min="0" max="255" value="0">
        </div>
        <div class="col">
            <div class="label">B (0-255)</div>
            <input type="number" id="b" min="0" max="255" value="0">
        </div>
        <div class="col">
            <div class="label">参数 k</div>
            <input type="number" id="k" min="0.1" max="10" step="0.1" value="1.0">
        </div>
    </div>
</div>

<!-- 颜色预览 -->
<div class="card">
    <h2>2. 颜色预览</h2>
    <div id="preview" class="color-preview"></div>
</div>

<!-- HSV 输出 -->
<div class="card">
    <h2>3. HSV（论文版 H∈[0,6]）</h2>
    <div class="row">
        <div class="col"><div class="label">H</div><div id="hsv_h" class="value">0.0000</div></div>
        <div class="col"><div class="label">S</div><div id="hsv_s" class="value">1.0000</div></div>
        <div class="col"><div class="label">V=Imax</div><div id="hsv_v" class="value">1.0000</div></div>
    </div>
</div>

<!-- HVI 输出 -->
<div class="card">
    <h2>4. HVI（论文核心）</h2>
    <div class="row">
        <div class="col"><div class="label">Ĥ</div><div id="hvi_H" class="value">1.0000</div></div>
        <div class="col"><div class="label">V̂</div><div id="hvi_V" class="value">0.0000</div></div>
        <div class="col"><div class="label">Imax</div><div id="hvi_imax" class="value">1.0000</div></div>
        <div class="col"><div class="label">Ck</div><div id="hvi_ck" class="value">1.0000</div></div>
    </div>
</div>

<!-- 可视化：一维H断裂 + HV圆盘 -->
<div class="card">
    <h2>5. 可视化：一维H断裂（HSV缺陷）</h2>
    <div class="canvas-row">
        <canvas id="hCanvas" width="400" height="120"></canvas>
    </div>

    <h2 style="margin-top:30px">6. 可视化：HV 极坐标平面（HVI连续无断裂）</h2>
    <div class="canvas-row">
        <canvas id="hvCanvas" width="360" height="360"></canvas>
    </div>
</div>

<script>
// 绑定输入
const r = document.getElementById('r');
const g = document.getElementById('g');
const b = document.getElementById('b');
const k = document.getElementById('k');
const picker = document.getElementById('colorPicker');
const preview = document.getElementById('preview');
const hvCanvas = document.getElementById('hvCanvas');
const hCanvas = document.getElementById('hCanvas');
const ctxHv = hvCanvas.getContext('2d');
const ctxH = hCanvas.getContext('2d');

picker.addEventListener('input', () => {
    const c = picker.value;
    const rr = parseInt(c.slice(1,3),16);
    const gg = parseInt(c.slice(3,5),16);
    const bb = parseInt(c.slice(5,7),16);
    r.value = rr; g.value = gg; b.value = bb; update();
});
[r,g,b,k].forEach(el => el.addEventListener('input', update));

// ------------------------------
// 论文公式：RGB → HSV
// ------------------------------
function rgb2hsv(r01, g01, b01) {
    const maxc = Math.max(r01, g01, b01);
    const minc = Math.min(r01, g01, b01);
    const delta = maxc - minc;
    let h = 0, s = 0, v = maxc;
    if (delta === 0) { h=0; s=0; }
    else {
        s = delta / maxc;
        if (maxc === r01) h = (g01 - b01) / delta;
        else if (maxc === g01) h = 2 + (b01 - r01) / delta;
        else h = 4 + (r01 - g01) / delta;
        h = h % 6;
        if (h < 0) h += 6;
    }
    return { h, s, v };
}

// ------------------------------
// 论文公式：HSV → HVI
// ------------------------------
function hsv2hvi(h_hsv, s_hsv, v_hsv, k_val) {
    const eps = 1e-8;
    const h_polar = Math.cos(Math.PI * h_hsv / 3);
    const v_polar = Math.sin(Math.PI * h_hsv / 3);
    const Ck = Math.sin(Math.PI * v_hsv / 2) ** (1 / (k_val + eps));
    const H_hat = Ck * s_hsv * h_polar;
    const V_hat = Ck * s_hsv * v_polar;
    return { H_hat, V_hat, Ck, h_polar, v_polar };
}

// ------------------------------
// 绘制一维H：展示红色断裂
// ------------------------------
function drawHueLine(hValue) {
    ctxH.clearRect(0,0,400,120);
    const w = 400, h = 120;
    ctxH.lineWidth = 2;
    // 画色带
    const grd = ctxH.createLinearGradient(0,60, w,60);
    for(let t=0;t<=1;t+=1/6){
        const h = t*6;
        const rgb = hsv2rgb(h,1,1);
        grd.addColorStop(t, `rgb(${rgb.r|0},${rgb.g|0},${rgb.b|0})`);
    }
    ctxH.fillStyle = grd;
    ctxH.fillRect(20,40,w-40,40);
    // 红色断裂标记
    ctxH.fillStyle = '#ff0000';
    ctxH.font = '14px bold';
    ctxH.fillText('断裂', 9, 28);
    ctxH.fillText('断裂', 372, 28);
    ctxH.strokeStyle = 'red';
    ctxH.beginPath(); ctxH.moveTo(20,35); ctxH.lineTo(20,85); ctxH.stroke();
    ctxH.beginPath(); ctxH.moveTo(380,35); ctxH.lineTo(380,85); ctxH.stroke();
    // 当前指针
    const x = 20 + (hValue/6)*(w-40);
    ctxH.strokeStyle = 'white'; ctxH.lineWidth=3;
    ctxH.beginPath(); ctxH.moveTo(x,30); ctxH.lineTo(x,90); ctxH.stroke();
}

// ------------------------------
// 绘制 HV 极坐标圆盘
// ------------------------------
function drawHvDisk(H_hat, V_hat) {
    const cx = 180, cy = 180, r = 160;
    ctxHv.clearRect(0,0,360,360);
    // 绘制彩色圆盘
    for(let ang=0;ang<Math.PI*2;ang+=0.01){
        const ca = Math.cos(ang);
        const sa = Math.sin(ang);
        const h = (3*ang/Math.PI) % 6;
        const rgb = hsv2rgb(h, 1, 1);
        ctxHv.strokeStyle = `rgb(${rgb.r|0},${rgb.g|0},${rgb.b|0})`;
        ctxHv.lineWidth = 3;
        ctxHv.beginPath();
        ctxHv.moveTo(cx,cy);
        ctxHv.lineTo(cx+ca*r, cy+sa*r);
        ctxHv.stroke();
    }
    // 画当前点
    const px = cx + H_hat * r;
    const py = cy + V_hat * r;
    ctxHv.fillStyle = 'white';
    ctxHv.strokeStyle = 'black';
    ctxHv.lineWidth = 4;
    ctxHv.beginPath();
    ctxHv.arc(px, py, 8, 0, Math.PI*2);
    ctxHv.fill(); ctxHv.stroke();
}

// ------------------------------
// 辅助：HSV转RGB用于绘图
// ------------------------------
function hsv2rgb(h, s, v) {
    let c = v * s;
    let x = c * (1 - Math.abs((h % 2) - 1));
    let m = v - c;
    let r=0,g=0,b=0;
    if(h>=0&&h<1){r=c;g=x;b=0;}
    else if(h>=1&&h<2){r=x;g=c;b=0;}
    else if(h>=2&&h<3){r=0;g=c;b=x;}
    else if(h>=3&&h<4){r=0;g=x;b=c;}
    else if(h>=4&&h<5){r=x;g=0;b=c;}
    else{r=c;g=0;b=x;}
    return {r:(r+m)*255,g:(g+m)*255,b:(b+m)*255};
}

// ------------------------------
// 全局更新
// ------------------------------
function update() {
    const R = Math.min(255, Math.max(0, Number(r.value) || 0));
    const G = Math.min(255, Math.max(0, Number(g.value) || 0));
    const B = Math.min(255, Math.max(0, Number(b.value) || 0));
    const k_val = Number(k.value) || 1.0;
    const r01=R/255,g01=G/255,b01=B/255;

    const hsv = rgb2hsv(r01,g01,b01);
    const hvi = hsv2hvi(hsv.h, hsv.s, hsv.v, k_val);

    // 显示数值
    document.getElementById('hsv_h').innerText = hsv.h.toFixed(4);
    document.getElementById('hsv_s').innerText = hsv.s.toFixed(4);
    document.getElementById('hsv_v').innerText = hsv.v.toFixed(4);
    document.getElementById('hvi_H').innerText = hvi.H_hat.toFixed(4);
    document.getElementById('hvi_V').innerText = hvi.V_hat.toFixed(4);
    document.getElementById('hvi_imax').innerText = hsv.v.toFixed(4);
    document.getElementById('hvi_ck').innerText = hvi.Ck.toFixed(4);

    // 预览
    preview.style.backgroundColor = `rgb(${R},${G},${B})`;
    picker.value = `#${((1<<24)+(R<<16)+(G<<8)+B).toString(16).slice(1)}`;

    // 画图
    drawHueLine(hsv.h);
    drawHvDisk(hvi.H_hat, hvi.V_hat);
}

// 初始化
update();
</script>
</body>
</html>
